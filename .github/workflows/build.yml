name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Build relay debug APK
        run: ./gradlew assembleRelayDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: relay-debug
          path: app/build/outputs/apk/relay/debug/*.apk
